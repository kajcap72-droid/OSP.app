org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+UseParallelGC -Dfile.encoding=UTF-8
org.gradle.parallel=true
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# CRITICAL FIX: Wymuszenie KSP1 zamiast KSP2 (domyślnego od KSP 2.0.0).
# KSP2 ma znany bug z Hilt 2.52: FileAlreadyExistsException dla _HiltModules.java
# Zob. https://github.com/google/dagger/issues/4161
# KSP1 jest deprecated od Kotlin 2.2, ale działa stabilnie z naszą konfiguracją.
ksp.useKSP2=false
