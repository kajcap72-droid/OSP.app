org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+UseParallelGC -Dfile.encoding=UTF-8
org.gradle.parallel=true
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# Fix dla Hilt + KSP FileAlreadyExistsException bug
# Wyłącza wielordzeniową kompilację KSP która powodowała duplikaty
ksp.incremental=false
ksp.incremental.intermodule=false

# Włącz K2 compiler (Kotlin 2.0)
kotlin.experimental.tryK2=true
